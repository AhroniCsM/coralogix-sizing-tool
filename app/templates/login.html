<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign In — Coralogix Sizing Tool</title>
    <link rel="icon" type="image/svg+xml" href="/static/img/favicon.svg">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        cx: {
                            dark: '#1a1a2e',
                            purple: '#6c5ce7',
                            blue: '#0984e3',
                            green: '#00b894',
                            orange: '#e17055',
                            red: '#d63031',
                        }
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-cx-dark min-h-screen flex items-center justify-center">
    <div class="bg-white rounded-2xl shadow-2xl p-10 max-w-md w-full mx-4 text-center">
        <!-- Logo -->
        <div class="mb-8">
            <div class="flex items-center justify-center gap-3 mb-4">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" class="w-12 h-12">
                    <circle cx="16" cy="16" r="15" fill="#00b894"/>
                    <path d="M9 16 L14 21 L23 11" stroke="white" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
                </svg>
                <span class="text-2xl font-bold text-gray-800">Coralogix</span>
            </div>
            <h1 class="text-xl text-gray-600 font-medium">Sizing Tool</h1>
        </div>

        {% if error %}
        <div class="bg-red-50 border border-red-200 text-red-700 px-4 py-3 rounded-lg mb-6 text-sm">
            {{ error }}
        </div>
        {% endif %}

        <p class="text-gray-500 text-sm mb-8">
            Sign in with your Coralogix Google account to access the sizing tool.
        </p>

        <a href="/auth/google"
           class="inline-flex items-center justify-center gap-3 w-full bg-white border-2 border-gray-200 hover:border-cx-green hover:bg-green-50 text-gray-700 font-medium py-3 px-6 rounded-lg transition">
            <!-- Google "G" icon -->
            <svg class="w-5 h-5" viewBox="0 0 24 24">
                <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 01-2.2 3.32v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.1z" fill="#4285F4"/>
                <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
                <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/>
                <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
            </svg>
            Sign in with Google
        </a>

        <p class="text-gray-400 text-xs mt-8">
            Only @coralogix.com email addresses are allowed.
        </p>
    </div>
</body>
</html>
