<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Coralogix Sizing Tool{% endblock %}</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="/static/css/style.css">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        cx: {
                            dark: '#1a1a2e',
                            purple: '#6c5ce7',
                            blue: '#0984e3',
                            green: '#00b894',
                            orange: '#e17055',
                            red: '#d63031',
                        }
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-gray-50 min-h-screen">
    <!-- Nav -->
    <nav class="bg-cx-dark text-white shadow-lg">
        <div class="max-w-7xl mx-auto px-4 py-3 flex items-center justify-between">
            <a href="/" class="text-xl font-bold tracking-tight">
                <span class="text-cx-green">CX</span> Sizing Tool
            </a>
            <div class="flex gap-4 text-sm">
                <a href="/" class="hover:text-cx-green transition">Upload</a>
                <a href="/history" class="hover:text-cx-green transition">History</a>
                <a href="/insights" class="hover:text-cx-green transition">Insights</a>
            </div>
        </div>
    </nav>

    <!-- Main -->
    <main class="max-w-7xl mx-auto px-4 py-8">
        {% block content %}{% endblock %}
    </main>

    <!-- Footer -->
    <footer class="text-center text-gray-400 text-xs py-4">
        Coralogix SE Sizing Tool &mdash; Powered by Israel SE Team
    </footer>

    <script src="/static/js/app.js"></script>
    {% block scripts %}{% endblock %}
</body>
</html>
