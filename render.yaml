services:
  - type: web
    name: coralogix-sizing-tool
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: CLAUDE_MODEL
        value: claude-sonnet-4-20250514
      - key: PORT
        value: "10000"
    healthCheckPath: /health
    autoDeploy: true
